<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>LineZero</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #f2f3f7;
    --header-bg: #ffffff;
    --surface: #ffffff;
    --surface-2: #f2f3f7;
    --text: #17171c;
    --hint: #7c7c88;
    --accent: #ff4d6d;
    --accent-text: #ffffff;
    --shadow: 0 2px 12px rgba(23, 23, 28, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    padding-bottom: 24px;
  }
  .screen { display: none; }
  .screen.active { display: block; animation: fade-in 0.22s ease; }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .screen.active { animation: none; }
  }
  .screen-pad { padding: 16px; }

  h1.headline {
    font-size: 22px;
    font-weight: 800;
    line-height: 1.25;
    margin: 0 0 2px;
  }
  h1.headline .accent { color: var(--accent); }
  h1.title {
    font-size: 20px;
    font-weight: 700;
    margin: 8px 0 4px;
  }
  .subtitle {
    color: var(--hint);
    font-size: 13px;
    margin-bottom: 16px;
  }
  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--hint);
    text-transform: uppercase;
    margin: 4px 0 10px;
  }

  /* Home header: pure white, same as the logo's own background, so the logo
     sits flush with no visible box around it */
  .home-header {
    background: var(--header-bg);
    padding: 20px 16px 18px;
    border-radius: 0 0 26px 26px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
  }
  .brand-logo {
    display: block;
    height: 40px;
    width: auto;
    margin-bottom: 12px;
  }

  /* Category pills */
  .pill-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 18px;
    scrollbar-width: none;
  }
  .pill-row::-webkit-scrollbar { display: none; }
  .pill {
    flex: 0 0 auto;
    border: 1px solid var(--surface-2);
    border-radius: 999px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 700;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.1s ease;
  }
  .pill:active { transform: scale(0.95); }
  .pill.selected {
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
  }

  /* Item rows */
  .item-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    box-shadow: var(--shadow);
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .item-row .thumb {
    flex: 0 0 auto;
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }
  .item-row .info { flex: 1 1 auto; min-width: 0; }
  .item-row .name { font-size: 15px; font-weight: 700; }
  .item-row .price { color: var(--hint); font-size: 13px; margin-top: 2px; }

  button.add-btn {
    flex: 0 0 auto;
    width: 34px; height: 34px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: var(--accent-text);
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  button.add-btn:active { transform: scale(0.9); }
  .stepper {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .stepper .step-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: var(--accent-text);
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .stepper .step-btn:active { transform: scale(0.88); }
  .stepper .qty {
    min-width: 16px;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  /* Cart preview panel */
  .cart-panel {
    background: var(--surface);
    box-shadow: var(--shadow);
    border-radius: 18px;
    padding: 14px 16px;
    margin-top: 8px;
  }
  .cart-panel h2 {
    font-size: 14px;
    font-weight: 700;
    margin: 0 0 8px;
  }
  .cart-panel ul {
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 14px;
  }
  .cart-panel li { padding: 3px 0; }
  .cart-panel li::before { content: "• "; color: var(--accent); }

  /* Pickup time slot */
  .slot-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--surface);
    box-shadow: var(--shadow);
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .slot-btn:active { transform: scale(0.97); }

  /* Order review */
  .review-line {
    background: var(--surface);
    box-shadow: var(--shadow);
    border-radius: 16px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .review-line .name-qty { font-size: 15px; font-weight: 700; }
  .review-line .price-line { color: var(--hint); font-size: 13px; margin-top: 3px; }
  .review-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--accent);
    color: var(--accent-text);
    border-radius: 16px;
    margin-top: 14px;
    padding: 14px 16px;
    font-size: 19px;
    font-weight: 800;
  }

  .empty { color: var(--hint); font-size: 14px; padding: 20px 0; text-align: center; }
</style>
</head>
<body>

  <div id="screen-home" class="screen active">
    <div class="home-header">
      <img class="brand-logo" src="/logo.png" alt="College logo" />
      <h1 class="headline">What would you <span class="accent">like</span> to order?</h1>
    </div>

    <div class="screen-pad" style="padding-top:0;">
      <div class="eyebrow">Choose your category</div>
      <div id="pill-row" class="pill-row"><div class="empty">Loading menu…</div></div>

      <div id="item-list"></div>

      <div class="cart-panel">
        <h2 id="cart-heading">🛒 Cart</h2>
        <div id="cart-preview"><div class="empty">Your cart is empty.</div></div>
      </div>
    </div>
  </div>

  <div id="screen-slot" class="screen screen-pad">
    <h1 class="title">When should we prepare this?</h1>
    <div class="subtitle">Choose a pickup time.</div>
    <div id="slot-options">
      <button class="slot-btn" data-slot="now">⚡ Right now</button>
      <button class="slot-btn" data-slot="1030">🕥 At 10:30 AM (today)</button>
    </div>
  </div>

  <div id="screen-review" class="screen screen-pad">
    <h1 class="title">Order Summary</h1>
    <div class="subtitle" id="review-pickup"></div>
    <div id="review-lines"></div>
    <div class="review-total"><span>Total</span><span id="review-total-value">₹0.00</span></div>
  </div>

<script>
  const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

  const SUPABASE_URL = "https://dlurqyzhzyclcxghlvur.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_hVcENAV4TBUZtbyKB8kM7w_N7hvXU3O";

  const ACCENT = "#ff4d6d";
  const ACCENT_TEXT = "#ffffff";

  const CATEGORY_EMOJI = {
    "Breakfast & Snacks": "\u{1F373}",
    "Chicken Starters": "\u{1F357}",
    "Non-Veg Curry Items": "\u{1F35B}",
    "Non-Veg Rice Items": "\u{1F35A}",
    "Beverages": "\u{1F964}",
    "Desserts": "\u{1F370}",
  };
  const DEFAULT_EMOJI = "\u{1F37D}️";
  const SLOT_LABELS = { now: "Right now", "1030": "10:30 AM (today)" };

  // A fixed vibrant color per category (cycled by index), used as a soft-tint
  // thumbnail background so the list doesn't read as flat/monochrome.
  const ICON_COLORS = ["#ff6b4a", "#ffb020", "#3ddc97", "#7c3aed", "#ff4d6d", "#00b8d9"];
  const categoryColor = (categories, cat) => ICON_COLORS[categories.indexOf(cat) % ICON_COLORS.length];

  const rupees = (n) => `₹${Number(n ?? 0).toFixed(2)}`;

  if (tg) {
    tg.ready();
    tg.expand();
    tg.MainButton.setParams({ color: ACCENT, text_color: ACCENT_TEXT });
  }

  // --- State ---
  let menu = [];          // [{id, name, price, category}]
  const cart = {};        // menu_item_id -> quantity
  let activeCategory = null;
  let pickupSlot = null;  // "Right now" | "10:30 AM (today)"
  let screen = "home";

  const BACK_TARGET = { slot: "home", review: "slot" };

  function showScreen(name) {
    screen = name;
    document.querySelectorAll(".screen").forEach((el) => el.classList.remove("active"));
    document.getElementById(`screen-${name}`).classList.add("active");
    updateChrome();
  }

  function cartQuantityTotal() {
    return Object.values(cart).reduce((sum, q) => sum + q, 0);
  }
  function cartAmountTotal() {
    return Object.entries(cart).reduce((sum, [id, q]) => {
      const item = menu.find((m) => m.id === id);
      return sum + (item ? item.price * q : 0);
    }, 0);
  }

  // --- Telegram native chrome (MainButton / BackButton) per screen ---
  function updateChrome() {
    if (!tg) return;

    tg.BackButton.offClick(handleBack);
    tg.MainButton.offClick(handleMainButton);

    if (screen === "home") {
      tg.BackButton.hide();
      const qty = cartQuantityTotal();
      tg.MainButton.setText(qty > 0 ? `Next (${rupees(cartAmountTotal())})` : "Next");
      tg.MainButton.show();
      if (qty > 0) tg.MainButton.enable(); else tg.MainButton.disable();
    } else if (screen === "slot") {
      tg.BackButton.show();
      tg.MainButton.hide();
    } else if (screen === "review") {
      tg.BackButton.show();
      tg.MainButton.setText(`Confirm order ${rupees(cartAmountTotal())}`);
      tg.MainButton.show();
      tg.MainButton.enable();
    }

    tg.BackButton.onClick(handleBack);
    tg.MainButton.onClick(handleMainButton);
  }

  function handleBack() {
    showScreen(BACK_TARGET[screen] || "home");
  }

  async function handleMainButton() {
    if (screen === "home") {
      if (cartQuantityTotal() === 0) return;
      showScreen("slot");
    } else if (screen === "review") {
      await confirmOrder();
    }
  }

  document.getElementById("slot-options").addEventListener("click", (event) => {
    const btn = event.target.closest(".slot-btn");
    if (!btn) return;
    pickupSlot = SLOT_LABELS[btn.dataset.slot];
    if (tg) tg.HapticFeedback.selectionChanged();
    renderReview();
    showScreen("review");
  });

  // --- Home: category pills + filtered item list + cart preview ---
  function renderPills() {
    const categories = [...new Set(menu.map((m) => m.category))];
    if (!activeCategory) activeCategory = categories[0];
    const el = document.getElementById("pill-row");
    el.innerHTML = categories.length
      ? categories
          .map(
            (cat) => `
            <button class="pill${cat === activeCategory ? " selected" : ""}" data-category="${cat}">
              ${CATEGORY_EMOJI[cat] || DEFAULT_EMOJI} ${cat}
            </button>`
          )
          .join("")
      : `<div class="empty">Menu unavailable right now.</div>`;
  }

  function renderItemList() {
    const el = document.getElementById("item-list");
    const categories = [...new Set(menu.map((m) => m.category))];
    const items = menu.filter((m) => m.category === activeCategory);
    el.innerHTML = items
      .map((item) => {
        const qty = cart[item.id] || 0;
        const control = qty
          ? `<div class="stepper">
               <button class="step-btn" data-action="dec" data-id="${item.id}">−</button>
               <span class="qty">${qty}</span>
               <button class="step-btn" data-action="inc" data-id="${item.id}">+</button>
             </div>`
          : `<button class="add-btn" data-action="inc" data-id="${item.id}">+</button>`;
        return `
          <div class="item-row">
            <div class="thumb" style="background:${categoryColor(categories, item.category)}26">${CATEGORY_EMOJI[item.category] || DEFAULT_EMOJI}</div>
            <div class="info">
              <div class="name">${item.name}</div>
              <div class="price">${rupees(item.price)}</div>
            </div>
            ${control}
          </div>`;
      })
      .join("");
  }

  function renderCartPreview() {
    const previewEl = document.getElementById("cart-preview");
    const headingEl = document.getElementById("cart-heading");
    const qty = cartQuantityTotal();
    headingEl.textContent = qty > 0 ? `\u{1F6D2} Cart (${qty} item${qty > 1 ? "s" : ""})` : "\u{1F6D2} Cart";

    const lines = Object.entries(cart)
      .map(([id, q]) => {
        const item = menu.find((m) => m.id === id);
        return item ? `${item.name} ×${q}` : null;
      })
      .filter(Boolean);
    previewEl.innerHTML = lines.length
      ? `<ul>${lines.map((line) => `<li>${line}</li>`).join("")}</ul>`
      : `<div class="empty">Your cart is empty.</div>`;
  }

  function renderHome() {
    renderPills();
    renderItemList();
    renderCartPreview();
  }

  document.getElementById("pill-row").addEventListener("click", (event) => {
    const pill = event.target.closest(".pill");
    if (!pill) return;
    activeCategory = pill.dataset.category;
    if (tg) tg.HapticFeedback.selectionChanged();
    renderPills();
    renderItemList();
  });

  document.getElementById("item-list").addEventListener("click", (event) => {
    const btn = event.target.closest("button[data-action]");
    if (!btn) return;
    const id = btn.dataset.id;
    const delta = btn.dataset.action === "inc" ? 1 : -1;
    const next = (cart[id] || 0) + delta;
    if (next <= 0) delete cart[id];
    else cart[id] = next;
    if (tg) tg.HapticFeedback.selectionChanged();
    renderItemList();
    renderCartPreview();
    updateChrome();
  });

  // --- Order review ---
  function renderReview() {
    document.getElementById("review-pickup").textContent = `Pickup: ${pickupSlot}`;
    const el = document.getElementById("review-lines");
    el.innerHTML = Object.entries(cart)
      .map(([id, qty]) => {
        const item = menu.find((m) => m.id === id);
        const subtotal = item.price * qty;
        const priceLine = qty > 1 ? `${rupees(item.price)} × ${qty} = ${rupees(subtotal)}` : rupees(subtotal);
        return `
          <div class="review-line">
            <div class="name-qty">${item.name} ×${qty}</div>
            <div class="price-line">${priceLine}</div>
          </div>`;
      })
      .join("");
    document.getElementById("review-total-value").textContent = rupees(cartAmountTotal());
  }

  // --- Finalize: backend creates the order + pushes the pay message to chat, then we close ---
  async function confirmOrder() {
    const items = Object.entries(cart).map(([menu_item_id, quantity]) => ({ menu_item_id, quantity }));
    tg && tg.MainButton.showProgress();
    try {
      const resp = await fetch("/api/orders", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ init_data: tg ? tg.initData : "", items, pickup_slot: pickupSlot }),
      });
      if (!resp.ok) {
        tg && tg.showAlert("Could not place the order. Please try again.");
        return;
      }
      if (tg) {
        tg.HapticFeedback.notificationOccurred("success");
        tg.close();
      }
    } finally {
      tg && tg.MainButton.hideProgress();
    }
  }

  // --- Load menu ---
  async function loadMenu() {
    const resp = await fetch(
      `${SUPABASE_URL}/rest/v1/menu_items?select=id,name,price,category&is_available=eq.true&order=category,name`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    menu = await resp.json();
    menu = menu.map((m) => ({ ...m, price: Number(m.price) }));
    renderHome();
  }

  loadMenu();
  updateChrome();
</script>
</body>
</html>
